---
# =============================================================================
# Ansible Role: Package Update - Tasks: Prerequisites
# =============================================================================
# Ensure system prerequisites for updates.
# =============================================================================

- name: Package-Update | prerequisites | Install dnf-utils package (RedHat)
  become: true
  ansible.builtin.package:
    name: dnf-plugins-core
    state: present
  when: >
    ansible_facts['os_family'] | lower == "redhat" and
    ansible_facts['pkg_mgr'] == "dnf"

- name: Package-Update | prerequisites | Create log directory
  become: true
  ansible.builtin.file:
    path: "{{ package_update_log_directory }}"
    state: directory
    owner: "root"
    group: "root"
    mode: '0700'
