---
# Package-Update Post-Info — Gather system information after updates.

- name: Package-Update | post_info | Gather package facts
  become: true
  ansible.builtin.package_facts:
    manager: auto
  no_log: true

- name: Package-Update | post_info | Gather service facts
  become: true
  ansible.builtin.service_facts:
  no_log: true

- name: Package-Update | post_info | Record currently running services
  ansible.builtin.set_fact:
    __package_update_post_running_services: "{{ ansible_facts.services | dict2items
      | selectattr('value.state', '==', 'running') | map(attribute='key') }}"

- name: Package-Update | post_info | Log information to remote system
  become: true
  ansible.builtin.template:
    src: "{{ item.source }}"
    dest: "{{ item.destination }}"
    mode: "0644"
  with_items:
    - { source: 'templates/system_info.j2', destination: '{{ package_update_log_directory }}/{{ __package_update_log_file_name }}_post-system-info' }
    - { source: 'templates/post_services_info.j2', destination: '{{ package_update_log_directory }}/{{ __package_update_log_file_name }}_post-running-services' }

- name: Package-Update | post_info | Log information to local system
  delegate_to: localhost
  become: false
  ansible.builtin.template:
    src: "{{ item.source }}"
    dest: "{{ item.destination }}"
    mode: "0644"
  with_items:
    - { source: 'templates/system_info.j2', destination: '{{ playbook_dir }}/{{ __package_update_log_file_name }}_post-system-info' }
    - { source: 'templates/post_services_info.j2', destination: '{{ playbook_dir }}/{{ __package_update_log_file_name }}_post-running-services' }
