---
# =============================================================================
# Ansible Role: Package Update - Tasks: Assert
# =============================================================================
# Runtime validation of variable values.
# Basic type/choice validation is handled by meta/argument_specs.yml.
# This file performs runtime-only checks (regex patterns, content validation, cross-field logic).
# =============================================================================

- name: Package-Update | assert | Validate supported OS family
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] | lower in ['redhat', 'debian']
    fail_msg: "Unsupported OS family '{{ ansible_facts['os_family'] }}'. Supported: RedHat, Debian"
    success_msg: "OS family: {{ ansible_facts['os_family'] }}"

- name: Package-Update | assert | Validate role action choice
  ansible.builtin.assert:
    that:
      - package_update_role_action in ["all", "check"]
    fail_msg: "Invalid role action '{{ package_update_role_action }}'. Allowed: all, check"
    success_msg: "Role action: {{ package_update_role_action }}"

- name: Package-Update | assert | Validate update mode choice
  ansible.builtin.assert:
    that:
      - package_update_mode in ["all", "security", "selected"]
    fail_msg: "Invalid update mode '{{ package_update_mode }}'. Allowed: all, security, selected"
    success_msg: "Update mode: {{ package_update_mode }}"

- name: Package-Update | assert | Validate included packages list is not empty when mode is selected
  ansible.builtin.assert:
    that:
      - package_update_include_packages_list is defined
      - package_update_include_packages_list | length > 0
    fail_msg: "Included packages list cannot be empty when update mode is 'selected'"
    success_msg: "Included packages: {{ package_update_include_packages_list | length }} packages"
  when: >
    package_update_mode == "selected"

- name: Package-Update | assert | Validate log directory path
  ansible.builtin.assert:
    that:
      - package_update_log_directory is match('^/.+')
    fail_msg: "Invalid log directory '{{ package_update_log_directory }}'. Must be an absolute path"
    success_msg: "Log directory: {{ package_update_log_directory }}"

- name: Package-Update | assert | Validate boolean flags
  ansible.builtin.assert:
    that:
      - package_update_display_upgradable_packages is boolean
      - package_update_log_upgradable_packages is boolean
      - package_update_disk_space_check_enabled is boolean
      - package_update_abort_on_disk_space_error is boolean
    fail_msg: "Boolean flags must be true or false"

- name: Package-Update | assert | Validate disk check paths structure
  ansible.builtin.assert:
    that:
      - package_update_disk_check_paths is sequence
      - package_update_disk_check_paths | length > 0
    fail_msg: "Disk check paths must be a non-empty list"
    success_msg: "Disk check paths: {{ package_update_disk_check_paths | length }} paths"
  when: >
    package_update_disk_space_check_enabled | bool

- name: Package-Update | assert | Validate each disk check path entry
  ansible.builtin.assert:
    that:
      - item.path is defined
      - item.path is match('^/')
      - item.min_mb is defined
      - (item.min_mb | int) >= 0
      - (item.min_mb | int) <= 1048576
    fail_msg: "Invalid disk check entry: {{ item }}. Required: path (absolute) and min_mb (0-1048576)"
    success_msg: "Disk check: {{ item.path }} — min {{ item.min_mb }} MB"
  loop: "{{ package_update_disk_check_paths }}"
  when: >
    package_update_disk_space_check_enabled | bool

- name: Package-Update | assert | Validate reboot boolean flags
  ansible.builtin.assert:
    that:
      - package_update_reboot_enabled is boolean
      - package_update_reboot_wait is boolean
      - package_update_reboot_interval is boolean
    fail_msg: "Reboot boolean flags must be true or false"

- name: Package-Update | assert | Validate reboot timeout values
  ansible.builtin.assert:
    that:
      - (package_update_reboot_connect_timeout | int) > 0
      - (package_update_reboot_connect_timeout | int) <= 3600
      - (package_update_reboot_wait_ctimeout | int) > 0
      - (package_update_reboot_wait_ctimeout | int) <= 3600
      - (package_update_reboot_wait_delay | int) >= 0
      - (package_update_reboot_wait_delay | int) <= 600
      - (package_update_reboot_wait_timeout | int) > 0
      - (package_update_reboot_wait_timeout | int) <= 7200
      - (package_update_reboot_interval_seconds | int) > 0
      - (package_update_reboot_interval_seconds | int) <= 3600
    fail_msg: "Reboot timeout values out of range"
  when: >
    package_update_reboot_enabled | bool

- name: Package-Update | assert | Validate reboot message
  ansible.builtin.assert:
    that:
      - package_update_reboot_message is string
      - package_update_reboot_message | length > 0
    fail_msg: "Reboot message must be a non-empty string"
    success_msg: "Reboot message: {{ package_update_reboot_message }}"
  when: >
    package_update_reboot_enabled | bool

- name: Package-Update | assert | Validate excluded packages list is a sequence
  ansible.builtin.assert:
    that:
      - package_update_excluded_packages_list is sequence
    fail_msg: "Excluded packages list must be a list"
    success_msg: "Excluded packages list is a valid sequence"
  when: package_update_excluded_packages_list is defined
