---
# Package-Update Check — Detect available package updates.

- name: Package-Update | check | Update package cache (RedHat)
  become: true
  ansible.builtin.dnf:
    update_cache: true
  when: >
    ansible_facts['os_family'] | lower == "redhat" and
    ansible_facts['pkg_mgr'] == "dnf"

- name: Package-Update | check | Update package cache (Debian)
  become: true
  ansible.builtin.apt:
    update_cache: true
  when: >
    ansible_facts['os_family'] | lower == "debian" and
    ansible_facts['pkg_mgr'] == "apt"

- name: Package-Update | check | Check for available packages to upgrade
  become: true
  ansible.builtin.command: "{{ __package_update_check_update_command }}"
  register: __package_update_check_result
  no_log: true
  changed_when: false
  failed_when: __package_update_check_result.rc >= 2

- name: Package-Update | check | Set upgrade availability flag (RedHat)
  ansible.builtin.set_fact:
    __package_update_availability: true
  when: >
    __package_update_check_result.rc == 1 and
    ansible_facts['os_family'] | lower == "redhat"

- name: Package-Update | check | Set upgrade availability flag (Debian)
  ansible.builtin.set_fact:
    __package_update_availability: true
  when: >
    __package_update_check_result.stdout_lines | length > 1 and
    ansible_facts['os_family'] | lower == "debian"

- name: Package-Update | check | Display available packages (RedHat)
  ansible.builtin.debug:
    var: __package_update_check_result.stdout_lines
  when: >
    package_update_display_upgradable_packages | default(false) and
    __package_update_check_result.rc == 1 and
    ansible_facts['os_family'] | lower == "redhat"

- name: Package-Update | check | Display available packages (Debian)
  ansible.builtin.debug:
    var: __package_update_check_result.stdout_lines
  when: >
    package_update_display_upgradable_packages | default(false) and
    __package_update_check_result.stdout_lines | length > 1 and
    ansible_facts['os_family'] | lower == "debian"
