---
# Package-Update Disk Check — Verify disk space before updates.

- name: Package-Update | disk_check | Check available disk space
  become: true
  ansible.builtin.shell: |
    set -o pipefail
    df -B1M {{ item.path }} | awk 'NR==2 {print $4}'
  args:
    executable: /bin/bash
  register: __package_update_disk_space_result
  changed_when: false
  loop: "{{ package_update_disk_check_paths }}"
  when: >
    package_update_disk_space_check_enabled | bool

- name: Package-Update | disk_check | Set facts for path with insufficient space
  ansible.builtin.set_fact:
    __package_update_disk_space_insufficient: >-
      {{ __package_update_disk_space_insufficient | default([]) +
         [{'path': item.item.path, 'available': item.stdout | int, 'required': item.item.min_mb}] }}
  loop: "{{ __package_update_disk_space_result.results }}"
  when: >
    package_update_disk_space_check_enabled | bool and
    item.stdout | int < item.item.min_mb

- name: Package-Update | disk_check | Display paths with insufficient space
  ansible.builtin.debug:
    msg: |
      WARNING: Insufficient disk space detected:
      {% for item in __package_update_disk_space_insufficient %}
      - Path: {{ item.path }}
        Available: {{ item.available }} MB
        Required: {{ item.required }} MB
      {% endfor %}
  when: >
    package_update_disk_space_check_enabled | bool and
    __package_update_disk_space_insufficient is defined and
    __package_update_disk_space_insufficient | length > 0

- name: Package-Update | disk_check | Fail if insufficient disk space and abort enabled
  ansible.builtin.fail:
    msg: >
      Update aborted due to insufficient disk space.
      {% for item in __package_update_disk_space_insufficient %}
      {{ item.path }}: {{ item.available }} MB available, {{ item.required }} MB required.
      {% endfor %}
      Please free up disk space and try again.
  when: >
    package_update_disk_space_check_enabled | bool and
    package_update_abort_on_disk_space_error | bool and
    __package_update_disk_space_insufficient is defined and
    __package_update_disk_space_insufficient | length > 0
