---
# Package-Update Main — Orchestrates role execution in order.
# Flow: vars → assert → check → prereqs → disk → log → pre_info → install → reboot → post_info → verify

- name: Package-Update | main | Load OS-specific variables
  ansible.builtin.include_vars: "{{ lookup('first_found', params) }}"
  vars:
    params:
      files:
        - "{{ ansible_facts['distribution'] | lower }}_{{ ansible_facts['distribution_version'] | lower }}.yml"
        - "{{ ansible_facts['distribution'] | lower }}_{{ ansible_facts['distribution_major_version'] | lower }}.yml"
        - "{{ ansible_facts['distribution'] | lower }}.yml"
        - "{{ ansible_facts['os_family'] | lower }}_{{ ansible_facts['distribution_version'] | lower }}.yml"
        - "{{ ansible_facts['os_family'] | lower }}_{{ ansible_facts['distribution_major_version'].split('.')[0] }}.yml"
        - "{{ ansible_facts['os_family'] | lower }}.yml"
        - "main.yml"
      paths:
        - "{{ role_path }}/vars"
  tags:
    - always

- name: Package-Update | main | Validate role variables and requirements
  ansible.builtin.include_tasks: assert.yml
  tags:
    - always
    - validate

- name: Package-Update | main | Check for available package updates
  ansible.builtin.include_tasks: check.yml
  when: >
    package_update_role_action in ['all', 'check']
  tags:
    - always
    - check

- name: Package-Update | main | Execute system package update process
  when: >
    package_update_role_action in ['all'] and
    __package_update_availability | default(false)
  block:

    - name: Package-Update | main | Verify system prerequisites
      ansible.builtin.include_tasks: prerequisites.yml
      tags:
        - always
        - prerequisites

    - name: Package-Update | main | Verify disk space requirements
      ansible.builtin.include_tasks: disk_check.yml
      when: >
        package_update_disk_space_check_enabled | bool
      tags:
        - always
        - disk_check

    - name: Package-Update | main | Log list of packages to upgrade to remote system
      become: true
      ansible.builtin.template:
        src: "{{ item.source }}"
        dest: "{{ item.destination }}"
        mode: "0644"
      when: >
        package_update_log_upgradable_packages | default(false)
      with_items:
        - { source: 'templates/packages_info.j2', destination: '{{ package_update_log_directory }}/{{ __package_update_log_file_name }}_upgradable-packages' }
      tags:
        - always
        - logging

    - name: Package-Update | main | Log list of packages to upgrade to local system
      delegate_to: localhost
      become: false
      ansible.builtin.template:
        src: "{{ item.source }}"
        dest: "{{ item.destination }}"
        mode: "0644"
      when: >
        package_update_log_upgradable_packages | default(false)
      with_items:
        - { source: 'templates/packages_info.j2', destination: '{{ playbook_dir }}/{{ __package_update_log_file_name }}_upgradable-packages' }
      tags:
        - always
        - logging

    - name: Package-Update | main | Gather pre-update system information
      ansible.builtin.include_tasks: pre_info.yml
      tags:
        - always
        - pre_info

    - name: Package-Update | main | Install package updates
      ansible.builtin.include_tasks: install.yml
      tags:
        - always
        - install

    - name: Package-Update | main | Check if system needs reboot (RedHat)
      become: true
      ansible.builtin.command: "dnf -q needs-restarting -r"
      register: __package_update_reboot_required_redhat
      changed_when: __package_update_reboot_required_redhat.rc == 1
      failed_when: __package_update_reboot_required_redhat.rc != 0 and __package_update_reboot_required_redhat.rc != 1
      when: >
        ansible_facts['os_family'] | lower == "redhat"
      tags:
        - always
        - reboot_check

    - name: Package-Update | main | Check if system needs reboot (Debian)
      become: true
      ansible.builtin.stat:
        path: "/var/run/reboot-required"
      register: __package_update_reboot_required_debian
      when: >
        ansible_facts['os_family'] | lower == "debian"
      tags:
        - always
        - reboot_check

    - name: Package-Update | main | Check if services need reboot (RedHat)
      become: true
      ansible.builtin.command: "dnf -q needs-restarting -s"
      register: __package_update_reboot_required_services_redhat
      changed_when: __package_update_reboot_required_services_redhat.rc == 1
      failed_when: __package_update_reboot_required_services_redhat.rc != 0 and __package_update_reboot_required_services_redhat.rc != 1
      when: >
        ansible_facts['os_family'] | lower == "redhat"
      tags:
        - always
        - reboot_check

    - name: Package-Update | main | Check if services need reboot (Debian)
      become: true
      ansible.builtin.stat:
        path: "/var/run/reboot-required.pkgs"
      register: __package_update_reboot_required_services_debian
      when: >
        ansible_facts['os_family'] | lower == "debian"
      tags:
        - always
        - reboot_check

    - name: Package-Update | main | Reboot system if required (RedHat)
      ansible.builtin.include_tasks: reboot.yml
      when: >
        package_update_reboot_enabled | bool and
        (( ansible_facts['os_family'] | lower == "redhat" and __package_update_reboot_required_redhat.rc == 1 ) or
        ( ansible_facts['os_family'] | lower == "redhat" and __package_update_reboot_required_services_redhat.rc == 1 ))
      tags:
        - always
        - reboot

    - name: Package-Update | main | Reboot system if required (Debian)
      ansible.builtin.include_tasks: reboot.yml
      when: >
        package_update_reboot_enabled | bool and
        (( ansible_facts['os_family'] | lower == "debian" and __package_update_reboot_required_debian.stat.exists ) or
        ( ansible_facts['os_family'] | lower == "debian" and __package_update_reboot_required_services_debian.stat.exists ))
      tags:
        - always
        - reboot

    - name: Package-Update | main | Warn that reboot is pending but disabled
      ansible.builtin.debug:
        msg: >-
          WARNING: System reboot is required but disabled
          (package_update_reboot_enabled=false). Schedule reboot manually.
      when: >
        not (package_update_reboot_enabled | bool) and
        (( ansible_facts['os_family'] | lower == "redhat" and
           (__package_update_reboot_required_redhat.rc == 1 or
            __package_update_reboot_required_services_redhat.rc == 1) ) or
        ( ansible_facts['os_family'] | lower == "debian" and
           (__package_update_reboot_required_debian.stat.exists or
            __package_update_reboot_required_services_debian.stat.exists) ))
      tags:
        - always
        - reboot

    - name: Package-Update | main | Gather post-update system information
      ansible.builtin.include_tasks: post_info.yml
      tags:
        - always
        - post_info

    - name: Package-Update | main | Check if all pre-update services are running
      ansible.builtin.set_fact:
        __package_update_faulty_services: "{{ __package_update_pre_running_services | difference(__package_update_post_running_services) }}"
      tags:
        - always
        - service_check

    - name: Package-Update | main | Display stopped services after update
      ansible.builtin.debug:
        var: __package_update_faulty_services
      when: >
        __package_update_faulty_services is defined and
        __package_update_faulty_services | length > 0
      tags:
        - always
        - service_check

    - name: Package-Update | main | Log faulty services to remote system
      become: true
      ansible.builtin.template:
        src: "{{ item.source }}"
        dest: "{{ item.destination }}"
        mode: "0644"
      when: >
        __package_update_faulty_services is defined and
        __package_update_faulty_services | length > 0
      with_items:
        - { source: 'templates/faulty_services.j2', destination: '{{ package_update_log_directory }}/{{ __package_update_log_file_name }}_faulty-services' }
      tags:
        - always
        - logging

    - name: Package-Update | main | Log faulty services to local system
      delegate_to: localhost
      become: false
      ansible.builtin.template:
        src: "{{ item.source }}"
        dest: "{{ item.destination }}"
        mode: "0644"
      when: >
        __package_update_faulty_services is defined and
        __package_update_faulty_services | length > 0
      with_items:
        - { source: 'templates/faulty_services.j2', destination: '{{ playbook_dir }}/{{ __package_update_log_file_name }}_faulty-services' }
      tags:
        - always
        - logging
