---
# Package-Update Molecule — Verify role execution results.

- name: Molecule | Verify
  hosts: all
  gather_facts: true

  vars_files:
    - ../../defaults/main.yml
    - ../../vars/main.yml

  tasks:
    - name: Verify | Gather OS-specific variables
      ansible.builtin.include_vars: "{{ lookup('first_found', params) }}"
      vars:
        params:
          files:
            - "{{ ansible_facts['distribution'] | lower }}_{{ ansible_facts['distribution_version'] | lower }}.yml"
            - "{{ ansible_facts['distribution'] | lower }}_{{ ansible_facts['distribution_major_version'] | lower }}.yml"
            - "{{ ansible_facts['distribution'] | lower }}.yml"
            - "{{ ansible_facts['os_family'] | lower }}_{{ ansible_facts['distribution_version'] | lower }}.yml"
            - "{{ ansible_facts['os_family'] | lower }}_{{ ansible_facts['distribution_major_version'].split('.')[0] }}.yml"
            - "{{ ansible_facts['os_family'] | lower }}.yml"
            - "main.yml"
          paths:
            - "../../vars"

    # Package manager verification
    - name: Verify | Check apt presence (Debian)
      ansible.builtin.command: which apt
      register: __verify_apt_result
      changed_when: false
      failed_when: false
      when:
        - ansible_facts['os_family'] == "Debian"

    - name: Verify | Check dnf presence (RedHat)
      ansible.builtin.command: which dnf
      register: __verify_dnf_result
      changed_when: false
      failed_when: false
      when:
        - ansible_facts['os_family'] == "RedHat"

    - name: Verify | Assert package manager is available
      ansible.builtin.assert:
        that:
          - >
            (ansible_facts['os_family'] == 'Debian' and __verify_apt_result.rc == 0) or
            (ansible_facts['os_family'] == 'RedHat' and __verify_dnf_result.rc == 0)
        fail_msg: "Package manager not found"
        success_msg: "Package manager: {{ ansible_facts['pkg_mgr'] }}"

    # Log directory verification
    - name: Verify | Check log directory exists
      ansible.builtin.stat:
        path: "{{ package_update_log_directory }}"
      register: __verify_log_dir

    - name: Verify | Assert log directory was created
      ansible.builtin.assert:
        that:
          - __verify_log_dir.stat.exists
          - __verify_log_dir.stat.isdir
        fail_msg: "Log directory {{ package_update_log_directory }} does not exist"
        success_msg: "Log directory: {{ package_update_log_directory }}"

    # System update status
    - name: Verify | Check system update status
      ansible.builtin.command: "{{ __package_update_check_update_command }}"
      register: __verify_update_status
      changed_when: false
      failed_when: false

    - name: Verify | Display update status
      ansible.builtin.debug:
        msg: "System is up to date: {{ __verify_update_status.rc == 0 }}"

    # Service status verification
    - name: Verify | Check for failed services
      ansible.builtin.command: systemctl --failed --no-legend --no-pager
      register: __verify_failed_services
      changed_when: false
      failed_when: false
      when:
        - ansible_facts['service_mgr'] == 'systemd'

    - name: Verify | Display failed services
      ansible.builtin.debug:
        msg: "Failed services: {{ __verify_failed_services.stdout_lines | default([]) }}"
      when:
        - ansible_facts['service_mgr'] == 'systemd'
        - __verify_failed_services.stdout_lines | default([]) | length > 0
